# Datenschleuse — eigene deutsche PII-Recognizer
# Das ist der Kern-Differenzierer: Entitaeten, die Presidio standardmaessig NICHT erkennt.
#
# Live-Build-Befund (verifiziert 2026-07-22): ohne top-level `supported_languages`
# stuerzt der Analyzer-Worker beim Boot mit "argument of type 'NoneType' is not
# iterable" ab, obwohl jeder einzelne Recognizer sein eigenes supported_language/
# supported_languages hat (jeder Recognizer wird noch einzeln geladen, siehe
# Log "Loaded recognizer: ..." fuer alle -- der Crash passiert erst danach beim
# Zusammenbau der registry-weiten Sprachliste). Fix: explizit setzen.
supported_languages:
  - de

global_regex_flags: 26  # re.DOTALL | re.MULTILINE | re.IGNORECASE

recognizers:
  # --- Standard-Recognizer fuer Deutsch aktiv lassen ---
  - name: EmailRecognizer
    type: predefined
    supported_languages:
      - de
  - name: PhoneRecognizer
    type: predefined
    supported_languages:
      - de
  - name: IbanRecognizer
    type: predefined
    supported_languages:
      - de
  - name: CreditCardRecognizer
    type: predefined
    supported_languages:
      - de
  - name: SpacyRecognizer
    type: predefined
    supported_languages:
      - de
  # Live-Build-Befund (verifiziert 2026-07-22): fehlte hier -- Benchmark zeigte
  # 0% Recall auf IP_ADDRESS, weil eine explizite `recognizers:`-Liste die
  # Presidio-Defaults komplett ERSETZT statt ergaenzt. IpRecognizer war nie geladen.
  - name: IpRecognizer
    type: predefined
    supported_languages:
      - de

  # --- Eigene deutsche Recognizer ---
  - name: "DE_Steuer_ID"
    supported_language: "de"
    supported_entity: "DE_STEUER_ID"
    patterns:
      - name: "steuer_id_11_ziffern"
        regex: "\\b\\d{2}[ ]?\\d{3}[ ]?\\d{3}[ ]?\\d{3}\\b"
        score: 0.4
    context:
      - "steuer"
      - "steuer-id"
      - "steueridentifikationsnummer"
      - "idnr"
      - "identifikationsnummer"

  - name: "DE_Sozialversicherung"
    supported_language: "de"
    supported_entity: "DE_SOZIALVERSICHERUNG"
    patterns:
      - name: "sv_nummer"
        regex: "\\b\\d{2}[ ]?\\d{6}[ ]?[A-Z][ ]?\\d{3}\\b"
        score: 0.6
    context:
      - "sozialversicherung"
      - "rentenversicherung"
      - "sv-nummer"
      - "versicherungsnummer"

  - name: "DE_Handelsregister"
    supported_language: "de"
    supported_entity: "DE_HANDELSREGISTER"
    patterns:
      - name: "hrb_hra"
        regex: "\\bHR[AB][ ]?\\d{1,6}\\b"
        score: 0.7
    context:
      - "handelsregister"
      - "amtsgericht"

  - name: "DE_KFZ_Kennzeichen"
    supported_language: "de"
    supported_entity: "DE_KFZ_KENNZEICHEN"
    patterns:
      - name: "kfz"
        regex: "\\b[A-ZÄÖÜ]{1,3}-[A-Z]{1,2}[ ]?\\d{1,4}\\b"
        score: 0.5
    context:
      - "kennzeichen"
      - "kfz"
      - "auto"
      - "fahrzeug"

  # =====================================================================
  # QUASI-IDENTIFIER (QI) — neue Kategorie (siehe litellm/qi_generalization.py)
  # Einzeln harmlos, in Kombination re-identifizierend (Sweeney). Diese
  # Recognizer liefern nur die ERKENNUNG; die Session-Akkumulation und die
  # Generalisierung passieren im Custom-Guardrail, NICHT hier.
  # =====================================================================

  # DE_PLZ — 5-stellige deutsche Postleitzahl.
  # Bewusst MODERATER Score (5-stellige Zahlen sind oft auch Betraege/Kenn-
  # nummern) -- der Kontext ("plz"/"postleitzahl") hebt die Konfidenz. Wort-
  # grenzen \b verhindern Treffer INNERHALB langer Ziffernketten (z.B. IBAN,
  # Bestellnummern -> keine False Positives auf den Negativ-Faellen).
  - name: "DE_PLZ"
    supported_language: "de"
    supported_entity: "DE_PLZ"
    patterns:
      - name: "plz_5_ziffern"
        regex: "\\b\\d{5}\\b"
        score: 0.35
    context:
      - "plz"
      - "postleitzahl"

  # DE_GEBURTSJAHR — 4-stellige Jahreszahl (1900-2029) NUR mit Kontext-Wort
  # davor. Der Kontext ist per variabler Lookbehind DIREKT ins Muster gebacken
  # (Presidio nutzt das `regex`-Modul, das variable Lookbehinds unterstuetzt) --
  # so matcht eine blanke Jahreszahl NICHT (kein False Positive auf "Version
  # 2026"), und der Match-Span umfasst nur das JAHR (nicht das Kontext-Wort).
  - name: "DE_GEBURTSJAHR"
    supported_language: "de"
    supported_entity: "DE_GEBURTSJAHR"
    patterns:
      - name: "geburtsjahr_mit_kontext"
        regex: "(?<=(?:geboren|jahrgang|geburtsjahr|geb\\.)[ ]{0,4})(?:19\\d{2}|20[0-2]\\d)\\b"
        score: 0.6
    context:
      - "geboren"
      - "jahrgang"
      - "geburtsjahr"
      - "geb."

  # DE_TVOED_STUFE — Tarif-/Besoldungsangabe.
  # Zwei Muster: (A) Entgelt-/Besoldungsgruppe mit Schema-Wort davor
  # ("TVöD E13", "Besoldungsgruppe A13"), (B) freistehende Gruppe wie "EG 9".
  - name: "DE_TVOED_STUFE"
    supported_language: "de"
    supported_entity: "DE_TVOED_STUFE"
    patterns:
      - name: "tarif_mit_schema"
        regex: "\\b(?:TVöD|TVoeD|TV-L|Besoldungsgruppe|Entgeltgruppe|BesGr)[ ]*[A-W]?[ ]?\\d{1,2}\\b"
        score: 0.6
      - name: "tarif_gruppe_kurz"
        regex: "\\b(?:EG|E|A|B|R|W)[ ]?\\d{1,2}\\b"
        score: 0.3
    context:
      - "tvöd"
      - "tvoed"
      - "tarif"
      - "besoldung"
      - "besoldungsgruppe"
      - "entgeltgruppe"
      - "eingruppierung"

  # DE_GENDER — Geschlechtsangabe als eigene Entitaet (deny_list, kein Regex).
  # WICHTIG (Live-Befund 2026-07-23): der YAML-Registry-Loader setzt den
  # deny_list_score NICHT auf den PatternRecognizer-Default (1.0), sondern auf
  # 0.0 -- und __analyze_patterns verwirft jeden Treffer mit score <= 0. Ohne
  # explizites deny_list_score matcht die deny_list also NIE. Daher zwingend
  # explizit setzen.
  - name: "DE_GENDER"
    supported_language: "de"
    supported_entity: "DE_GENDER"
    deny_list_score: 0.9
    deny_list:
      - "männlich"
      - "weiblich"
      - "divers"
      - "männl."
      - "weibl."
      - "nichtbinär"
      - "non-binär"
    context:
      - "geschlecht"

  # DE_BERUF — gaengige deutsche Berufsbezeichnungen (deny_list).
  # Beruf ALLEIN ist meist unkritisch -- diese Entitaet zaehlt v.a. zum
  # Session-Risiko (Beruf+Ort-Kombination). Die Kombinationslogik lebt im
  # Guardrail, nicht hier. Pragmatische v1-Liste (~40 Berufe).
  - name: "DE_BERUF"
    supported_language: "de"
    supported_entity: "DE_BERUF"
    deny_list_score: 0.7
    deny_list:
      - "Bürgermeister"
      - "Bürgermeisterin"
      - "Oberbürgermeister"
      - "Landrat"
      - "Landrätin"
      - "Chefarzt"
      - "Chefärztin"
      - "Oberarzt"
      - "Pfarrer"
      - "Pfarrerin"
      - "Priester"
      - "Rabbiner"
      - "Imam"
      - "Geschäftsführer"
      - "Geschäftsführerin"
      - "Vorstandsvorsitzender"
      - "Vorstand"
      - "Aufsichtsratsvorsitzender"
      - "Schulleiter"
      - "Schulleiterin"
      - "Rektor"
      - "Rektorin"
      - "Dekan"
      - "Professor"
      - "Professorin"
      - "Polizeipräsident"
      - "Polizeichef"
      - "Feuerwehrkommandant"
      - "Amtsleiter"
      - "Amtsleiterin"
      - "Notar"
      - "Notarin"
      - "Staatsanwalt"
      - "Staatsanwältin"
      - "Richter"
      - "Richterin"
      - "Ingenieur"
      - "Ingenieurin"
      - "Apotheker"
      - "Apothekerin"
      - "Steuerberater"
      - "Steuerberaterin"
      - "Ortsvorsteher"
      - "Gemeindevorsteher"
    context:
      - "beruf"
      - "tätig"
      - "arbeitet"
      - "position"

  # =====================================================================
  # DIREKT-IDENTIFIER — Aktenzeichen & Firmennamen
  # =====================================================================

  # DE_AKTENZEICHEN — Gerichts-/Behörden-Aktenzeichen und Geschäftszeichen.
  # Muster (A) fängt das klassische Gerichts-Aktenzeichen ab: führende
  # Kammer-/Senatsnummer (Ziffern ODER römisch, z.B. BGH "VI ZR 200/20"),
  # dann das Registerzeichen (1-5 Buchstaben, z.B. O, K, ZR, BvR), dann
  # laufende Nummer und Jahr ("123/45"). Der "/Jahr"-Teil ist der starke
  # Diskriminator -- reine Datums-/Versionszahlen (12/25, 2026.07.22) matchen
  # nicht, weil ihnen das mittlere Buchstaben-Token fehlt.
  # Muster (B) fängt behördliche Geschäftszeichen mit Bindestrich-/Punkt-
  # Struktur ab ("12-3456.7-8/9").
  - name: "DE_Aktenzeichen"
    supported_language: "de"
    supported_entity: "DE_AKTENZEICHEN"
    patterns:
      - name: "gerichts_aktenzeichen"
        regex: "\\b(?:\\d{1,4}|[IVX]{1,4})[ ][A-ZÄÖÜ][A-Za-zÄÖÜ]{0,4}[ ]\\d{1,5}/\\d{2,4}\\b"
        score: 0.55
      - name: "geschaeftszeichen"
        regex: "\\b\\d{1,4}-\\d{1,6}\\.\\d{1,3}-\\d{1,3}/\\d{1,4}\\b"
        score: 0.5
    context:
      - "aktenzeichen"
      - "az"
      - "geschäftszeichen"
      - "gz"
      - "gericht"

  # DE_FIRMA — deutscher Firmenname anhand der Rechtsform-Suffixe.
  # Struktur: eine Sequenz großgeschriebener Namens-Tokens (Konnektoren "&"
  # erlaubt, z.B. "Weber & Söhne") DIREKT gefolgt von einer Rechtsform. So wird
  # der GANZE Firmenname maskiert, nicht nur die Rechtsform.
  #
  # WICHTIG (Groß-/Kleinschreibung): global_regex_flags: 26 enthält
  # re.IGNORECASE. Die Namens- und Rechtsform-Teile stehen deshalb in einem
  # scoped-Inline-Flag `(?-i: ... )`, das IGNORECASE lokal ABSCHALTET -- sonst
  # würde `[A-ZÄÖÜ]` auch Kleinbuchstaben matchen und die "Großbuchstaben-Start"-
  # Logik wäre wirkungslos (Presidio nutzt das `regex`-Modul, das scoped Flags
  # unterstützt -- wie schon bei DE_GEBURTSJAHR mit variablem Lookbehind).
  # Das erzwungene Großschreib-Kriterium ist zugleich der False-Positive-Schutz:
  # "Für eine GmbH gelten ..." matcht NICHT, weil vor der Rechtsform nur das
  # kleingeschriebene "eine" steht (kein Name). Der abschließende Negativ-
  # Lookahead `(?![A-Za-z...])` verhindert, dass "AG" innerhalb von "Agentur"
  # anschlägt.
  #
  # Bekannte Grenze (ehrlich dokumentiert): weil im Deutschen JEDES Substantiv
  # großgeschrieben wird, kann eine generische Wendung wie "die Rechtsform GmbH"
  # einen False Positive erzeugen. Suffix-basierte Firmenerkennung im Deutschen
  # ist inhärent unscharf; der Score ist bewusst moderat gehalten.
  - name: "DE_Firma"
    supported_language: "de"
    supported_entity: "DE_FIRMA"
    patterns:
      - name: "firmenname_mit_rechtsform"
        regex: "\\b(?-i:[A-ZÄÖÜ][A-Za-zÄÖÜäöüß.\\-]+(?:[ ]+(?:&[ ]+)?[A-ZÄÖÜ][A-Za-zÄÖÜäöüß.\\-]+){0,4})[ ]+(?-i:GmbH[ ]?&[ ]?Co\\.[ ]?KG|gGmbH|GmbH|KGaA|UG[ ]?\\(haftungsbeschränkt\\)|mbH|AG|KG|OHG|GbR|e\\.[ ]?V\\.|e\\.[ ]?G\\.|SE|Inc\\.|Ltd\\.|LLC)(?![A-Za-zÄÖÜäöüß])"
        score: 0.6
    context:
      - "firma"
      - "unternehmen"
      - "gesellschaft"
      - "rechtsform"
