# Datenschleuse — Coolify-Deploy-Variante des docker-compose.yml
# ---------------------------------------------------------------------------
# Zweck: denselben Stack (LiteLLM-Proxy + Presidio + Postgres) so aufbauen,
# dass Coolify ihn direkt aus dem Git-Repo deployen kann.
#
# Single-Tenant by design: EINE Instanz = EIN EUROUTER_API_KEY (in der
# Coolify-UI gesetzt). Wer einen eigenen eurouter-Key nutzen will, hostet eine
# eigene Instanz (self-host per Coolify oder von Oliver bereitgestellt). Es gibt
# bewusst KEIN Multi-Tenant/Virtual-Key-Sharing — die PII-Pipeline ist fuer alle
# gleich, nur der Upstream-Key gehoert jeweils dem Instanz-Betreiber.
#
# Unterschiede zum lokalen docker-compose.yml (jeweils WARUM):
#  - KEINE `container_name`: Coolify vergibt eindeutige Container-Namen pro
#    Deployment. Feste Namen kollidieren, sobald mehrere Instanzen (oder mehrere
#    Coolify-Apps) auf demselben Host laufen.
#  - KEINE Host-`ports`-Bindings fuer interne Services: der Proxy-Service wird
#    ausschliesslich ueber Coolifys eingebauten Reverse-Proxy (Traefik/Caddy)
#    veroeffentlicht (SERVICE_FQDN-Magie, siehe unten). Presidio-Analyzer/
#    -Anonymizer und Postgres bleiben rein im internen Netz.
#  - `restart: unless-stopped` auf allen Services.
#  - `DATENSCHLEUSE_MASTER_KEY` wird explizit an den Container uebergeben (im
#    lokalen Compose fehlt das — dort loest `os.environ/DATENSCHLEUSE_MASTER_KEY`
#    in config.yaml ins Leere und der Proxy startet ohne Auth). Fuer einen
#    oeffentlich erreichbaren Deploy ist der Master-Key aber Pflicht.
#  - Secrets ausschliesslich als `${ENV}`-Referenzen — nie im Klartext (ISC-12).
#    Die konkreten Werte werden in der Coolify-UI als Environment-Variablen
#    gesetzt (Vorlage: coolify-template.json / .env.example).

services:
  # 1. LiteLLM-Proxy = die Datenschleuse-Schnittstelle (OpenAI-kompatibel).
  datenschleuse:
    build:
      context: ./litellm
      dockerfile: Dockerfile
    # SERVICE_FQDN_<IDENTIFIER>_<PORT>: Coolify erzeugt hieraus automatisch eine
    # Domain und verdrahtet den Reverse-Proxy auf den Container-Port 4000. Die
    # konkrete Domain setzt/aendert man in der Coolify-UI -- deshalb bewusst KEIN
    # hardcodierter Host()-Traefik-Label wie in einer projekteigenen Deploy-Datei.
    # So bekommt jeder Self-Hoster seine eigene Domain, ohne diese Datei zu editieren.
    expose:
      - "4000"
    environment:
      - SERVICE_FQDN_DATENSCHLEUSE_4000
      # Import der Guardrail-Klasse: /app muss auf dem PYTHONPATH liegen.
      - PYTHONPATH=/app
      - SENSITIVITY_KEYWORDS_PATH=/app/config/sensitivity-keywords.yml
      # Upstream-Key fuer eurouter.ai (Single-Tenant: gehoert dem Instanz-Betreiber).
      - EUROUTER_API_KEY=${EUROUTER_API_KEY:?EUROUTER_API_KEY muss gesetzt sein (dein eurouter.ai-Key)}
      # Master-Key, mit dem Clients die Datenschleuse ansprechen (LiteLLM erwartet
      # ein `sk-`-Praefix). Pflicht -- ohne ihn liefe der Proxy ohne Auth.
      - DATENSCHLEUSE_MASTER_KEY=${DATENSCHLEUSE_MASTER_KEY:?DATENSCHLEUSE_MASTER_KEY muss gesetzt sein (mit sk--Praefix)}
      - PRESIDIO_ANALYZER_API_BASE=http://presidio-analyzer:3000
      - PRESIDIO_ANONYMIZER_API_BASE=http://presidio-anonymizer:3000
      # Fernet-Schluessel fuer den verschluesselten Quasi-Identifier-State.
      # PFLICHT, solange der QI-Layer aktiv ist (qi_risk_preset in config.yaml
      # gesetzt, Default: aktiv). Der :?-Guard bricht den Deploy hart ab, wenn er
      # fehlt (fail-closed; der State laeuft nie unverschluesselt).
      - DATENSCHLEUSE_STATE_KEY=${DATENSCHLEUSE_STATE_KEY:?DATENSCHLEUSE_STATE_KEY muss gesetzt sein (Fernet-Key) -- der QI-Session-State laeuft nur verschluesselt}
      - DATENSCHLEUSE_STATE_DB=/app/state/qi_state.db
      - DATENSCHLEUSE_STATE_TTL_SECONDS=${DATENSCHLEUSE_STATE_TTL_SECONDS:-86400}
      # Postgres treibt das eingebaute LiteLLM-Admin-UI (/ui) + Spend-Logs an --
      # OHNE Message-Content (turn_off_message_logging in litellm/config.yaml).
      - DATABASE_URL=postgresql://${DATENSCHLEUSE_DB_USER:-datenschleuse}:${DATENSCHLEUSE_DB_PASSWORD:?DATENSCHLEUSE_DB_PASSWORD muss gesetzt sein (starkes Passwort)}@datenschleuse-db:5432/${DATENSCHLEUSE_DB_NAME:-datenschleuse}
      # Admin-UI Basic-Auth. UI_PASSWORD ohne Default -- damit das Admin-UI nie
      # mit einem bekannten Passwort oeffentlich erreichbar startet.
      - UI_USERNAME=${UI_USERNAME:-admin}
      - UI_PASSWORD=${UI_PASSWORD:?UI_PASSWORD muss gesetzt sein -- kein Default, damit das Admin-UI nie mit einem bekannten Passwort startet}
    volumes:
      # config.yaml wird NICHT ins Image kopiert (nur die .py-Module, siehe
      # Dockerfile) -> Mount ist zwingend, sonst findet der --config-Aufruf
      # die Datei nicht.
      #
      # Die .py-Module (datenschleuse_guardrail.py, qi_generalization.py,
      # qi_state.py, sensitivity_classifier.py) werden HIER BEWUSST NICHT
      # gemountet, obwohl der lokale docker-compose.yml das tut: dort dient
      # der Mount nur der Dev-Iteration ohne Rebuild, im Image sind die
      # Dateien via Dockerfile ohnehin schon vorhanden. Live-Deploy-Befund
      # (2026-07-23, Coolify): mehrere einzelne Datei-Bind-Mounts aus
      # demselben Quellordner (./litellm/*.py) auf Ziele, die im Image
      # bereits als Datei existieren, loesen nicht-deterministisch einen
      # Docker/runc-Mount-Fehler aus ("mounting a directory onto a file") --
      # welche Datei betroffen ist wechselt zwischen Deploys (Race in
      # Coolifys Checkout-Kopier-Schritt). Fuer einen produktiven Deploy
      # sind die Mounts ohnehin ueberfluessig (Code kommt fest aus dem
      # Image) -> ersatzlos entfernt statt gegen die Race anzukaempfen.
      - ./litellm/config.yaml:/app/config.yaml:ro
      # sensitivity_classifier.py sucht die Keyword-Config relativ zur eigenen
      # Datei (../presidio/...); im flachen /app existiert kein Geschwister-
      # presidio/ -> YAML explizit mounten + Pfad per ENV setzen (s.o.).
      - ./presidio/sensitivity-keywords.yml:/app/config/sensitivity-keywords.yml:ro
      # Verschluesselter QI-Session-State (SQLite) persistent halten.
      - datenschleuse-qi-state:/app/state
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    # Health-Check ueber LiteLLMs Liveness-Endpoint (kein DB-/Auth-Zwang).
    # python ist im Image garantiert vorhanden -- kein curl-Zwang. Endpoint-
    # Schreibweise ("liveliness") gegen die verwendete LiteLLM-Version pruefen.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=4).status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    depends_on:
      presidio-analyzer:
        condition: service_started
      presidio-anonymizer:
        condition: service_started
      datenschleuse-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - datenschleuse-net

  # 1b. Postgres fuer das LiteLLM-Admin-UI (Spend-Logs, Guardrail-Metadaten,
  # NIE Message-Content). Rein intern -- kein Host-Port.
  datenschleuse-db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${DATENSCHLEUSE_DB_USER:-datenschleuse}
      - POSTGRES_PASSWORD=${DATENSCHLEUSE_DB_PASSWORD:?DATENSCHLEUSE_DB_PASSWORD muss gesetzt sein (starkes Passwort)}
      - POSTGRES_DB=${DATENSCHLEUSE_DB_NAME:-datenschleuse}
    volumes:
      - datenschleuse-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATENSCHLEUSE_DB_USER:-datenschleuse}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - datenschleuse-net

  # 2. Presidio-Analyzer = erkennt PII (deutsches NLP-Modell + DE-Recognizer).
  # Rein intern -- der Produktiv-Traffic laeuft nur ueber datenschleuse-net.
  presidio-analyzer:
    build:
      context: ./presidio
      dockerfile: Dockerfile.analyzer
    environment:
      - ANALYZER_CONF_FILE=/conf/analyzer-config.yml
      - NLP_CONF_FILE=/conf/nlp-config.yml
      - RECOGNIZER_REGISTRY_CONF_FILE=/conf/recognizers-config.yml
    volumes:
      - ./presidio/analyzer-config.yml:/conf/analyzer-config.yml:ro
      - ./presidio/nlp-config.yml:/conf/nlp-config.yml:ro
      - ./presidio/recognizers-config.yml:/conf/recognizers-config.yml:ro
    restart: unless-stopped
    networks:
      - datenschleuse-net

  # 3. Presidio-Anonymizer (Teil des Standard-Stacks; rein intern).
  presidio-anonymizer:
    image: mcr.microsoft.com/presidio-anonymizer:latest
    restart: unless-stopped
    networks:
      - datenschleuse-net

networks:
  datenschleuse-net:
    driver: bridge

volumes:
  datenschleuse-db-data:
  # Verschluesselter, TTL-begrenzter Quasi-Identifier-Session-State (SQLite).
  datenschleuse-qi-state:
