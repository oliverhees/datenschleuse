# Datenschleuse — LiteLLM-Proxy-Konfiguration
# Forwardet an eurouter.ai (EU-gehostet, GDPR), mit Presidio-PII-Schutz davor.

model_list:
  # eurouter.ai ist OpenAI-kompatibel -> als openai-Provider mit eigener api_base.
  # Jeder Eintrag hier taucht 1:1 als waehlbares Modell in GET /v1/models auf --
  # das ist der Hebel, ueber den Hermes' "custom"-Provider (fetch_models() -> GET
  # {base_url}/models) automatisch eine Modellauswahl bekommt, ohne Hermes-Code.
  # Modell-IDs sind Platzhalter -- gegen die reale eurouter.ai-Modellliste pruefen
  # (ISC-2), sobald ein Test-Key vorliegt.
  - model_name: datenschleuse-gpt
    litellm_params:
      model: openai/openai/gpt-4o-mini
      api_base: https://www.eurouter.ai/api/v1
      api_key: os.environ/EUROUTER_API_KEY
  - model_name: datenschleuse-claude
    litellm_params:
      model: openai/anthropic/claude-sonnet-5
      api_base: https://www.eurouter.ai/api/v1
      api_key: os.environ/EUROUTER_API_KEY
  - model_name: datenschleuse-gemini
    litellm_params:
      model: openai/google/gemini-3-pro
      api_base: https://www.eurouter.ai/api/v1
      api_key: os.environ/EUROUTER_API_KEY
  # Weitere eurouter.ai-Modelle nach demselben Muster ergaenzen --
  # model_name ist frei waehlbar (das ist der Name, der in Hermes' Dropdown
  # erscheint), litellm_params.model muss der reale eurouter-Modell-Pfad sein.

guardrails:
  # EIGENE Custom-Guardrail-Klasse statt des eingebauten `guardrail: presidio`.
  # Grund: das LiteLLM-Bordmittel buffert bei Streaming-Responses den KOMPLETTEN
  # Antworttext, bevor es Platzhalter zurueck auf Klartext mapped -> es zerstoert
  # Time-to-first-Token (Streaming fuehlt sich an wie non-streaming). Unsere
  # Klasse haelt stattdessen nur einen kleinen Sliding-Window-Tail-Puffer und
  # erhaelt so echtes Token-Streaming. Sie ruft Presidio Analyzer selbst per REST
  # auf und verwaltet ihr eigenes Platzhalter->Klartext-Mapping in einem eigenen
  # Metadata-Key -> keine Kopplung an instabile LiteLLM-Interna.
  # Code: litellm/datenschleuse_guardrail.py  (Klasse DatenschleuseGuardrail)
  - guardrail_name: "datenschleuse-reid"
    litellm_params:
      guardrail: datenschleuse_guardrail.DatenschleuseGuardrail
      # pre_call  -> PII maskieren, bevor der Request ans LLM geht
      # post_call -> Antwort (Streaming + non-Streaming) re-identifizieren
      # Gegen die laufende LiteLLM-Version verifizieren, ob eine Liste
      # akzeptiert wird; falls nicht, "pre_call" setzen -- die post_call-Hooks
      # (async_post_call_streaming_iterator_hook / async_post_call_success_hook)
      # werden fuer aktive Guardrails ohnehin aufgerufen.
      mode: ["pre_call", "post_call"]
      default_on: true
      # --- Eigene Parameter der DatenschleuseGuardrail-Klasse ---
      presidio_language: "de"
      # Analyzer-URL: kommt sonst aus ENV PRESIDIO_ANALYZER_API_BASE
      # (siehe docker-compose.yml), Default http://presidio-analyzer:3000.
      # presidio_analyzer_url: "http://presidio-analyzer:3000"
      # Optionaler globaler Score-Schwellwert (0 = aus, Recognizer-Scores gelten):
      presidio_score_threshold: 0.0
      #
      # --- Quasi-Identifier-Layer (Session-uebergreifende Akkumulation) -----
      # Erkennt deutsche Quasi-Identifier (PLZ, Geburtsjahr, TVöD/Besoldung,
      # Geschlecht, Beruf) und generalisiert sie AB einem Schwellwert an
      # distinkten QI-Typen pro Session, statt sie im Klartext ans LLM zu
      # lassen (Sweeney: PLZ+Geburtsdatum+Geschlecht identifiziert ~87 %).
      # Preset steuert den Schwellwert (Utility vs. Privacy, siehe README):
      #   utility  -> 5 (permissiv, mehr Kontext bleibt)
      #   balanced -> 3 (Default)
      #   paranoid -> 1 (jede einzelne QI sofort generalisiert)
      # Ist qi_risk_preset NICHT gesetzt, bleibt der QI-Layer komplett AUS
      # (dann wird auch KEIN DATENSCHLEUSE_STATE_KEY gebraucht). Ist er gesetzt,
      # MUSS DATENSCHLEUSE_STATE_KEY vorhanden sein (fail-closed beim Start) --
      # der QI-Session-State wird verschluesselt + TTL-begrenzt lokal abgelegt.
      qi_risk_preset: "balanced"
      #
      # HINWEIS zur Migration von der alten `guardrail: presidio`-Config:
      # Die frueheren presidio-spezifischen Optionen sind bewusst ENTFERNT, weil
      # sie zu einem anderen Guardrail-Implementierungsvertrag gehoerten und von
      # unserer eigenen Klasse nicht gelesen werden. Ihre Logik lebt jetzt im
      # Code (litellm/datenschleuse_guardrail.py):
      #   - output_parse_pii     -> ersetzt durch die eigene Re-Id in den
      #                             post_call-Hooks (streaming + non-streaming).
      #   - pii_entities_config  -> die WELCHE Entitaeten erkannt werden, steuert
      #                             jetzt die Presidio-Analyzer-/Recognizer-Config
      #                             (presidio/recognizers-config.yml). Alle vom
      #                             Analyzer gefundenen Entitaeten werden maskiert
      #                             (MASK-Verhalten); ein separates BLOCK pro
      #                             Entitaet ist derzeit nicht implementiert
      #                             (bei Bedarf als Feature ergaenzen).
      #   - presidio_score_thresholds (pro Entitaet) -> aktuell nur ein globaler
      #                             Schwellwert (presidio_score_threshold);
      #                             feinere Per-Entitaet-Schwellen leben in den
      #                             Recognizer-Scores der Presidio-Config.

litellm_settings:
  # fail-closed: bei Guardrail-Fehler die Anfrage NICHT durchlassen
  set_verbose: true
  # Projekt-Prinzip "kein PII in Logs": Message-Content wird NIE geloggt,
  # Spend/Tokens/Modell/Zeitpunkt bleiben getrackt -> das ist die Datenbasis
  # fuer das Audit-Dashboard, ohne dass Klartext irgendwo landet. Vor
  # Produktivnutzung verifizieren (ISC-19), ob Content bei aktivem Flag durch
  # Platzhalter ersetzt oder komplett weggelassen wird.
  turn_off_message_logging: true

general_settings:
  # Master-Key fuer den Zugriff auf den Proxy (in .env setzen)
  master_key: os.environ/DATENSCHLEUSE_MASTER_KEY
